name            = "byod-form-receiver"
main            = "src/index.js"
compatibility_date = "2024-09-23"

[vars]
GITHUB_REPO      = "StaticFDP/ga4gh-rare-disease-trajectories"
LANDING_PAGE     = "https://fdp.semscape.org/ga4gh-rare-disease-trajectories/"

# EU mirror (Codeberg/Forgejo) — enables dual-write on form submission
# Set FORGEJO_TOKEN via: wrangler secret put FORGEJO_TOKEN
FORGEJO_BASE_URL = "https://codeberg.org"
FORGEJO_REPO     = "StaticFDP/ga4gh-rare-disease-trajectories"

# Secrets (set once via: wrangler secret put <NAME>)
# GITHUB_TOKEN  — fine-grained PAT, scope: Issues: Read & Write
#                 on StaticFDP/ga4gh-rare-disease-trajectories only
# FORGEJO_TOKEN — Codeberg access token with Issues: Read & Write
#                 on StaticFDP/ga4gh-rare-disease-trajectories on Codeberg
